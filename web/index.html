<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truco de Mesa</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="kicker">Mesa Paulista</p>
          <h1>Truco</h1>
        </div>
        <button id="new-match-btn" class="btn ghost">Nova Partida</button>
      </header>

      <section class="scoreboard">
        <article class="score-card human">
          <h2>Você</h2>
          <p id="score-human" class="score">0</p>
        </article>
        <article class="score-center">
          <p>Mão vale</p>
          <strong id="hand-value">1</strong>
          <p>até 12</p>
        </article>
        <article class="score-card bot">
          <h2>Bot</h2>
          <p id="score-bot" class="score">0</p>
        </article>
      </section>

      <section class="table" aria-label="Mesa de jogo">
        <div class="opponent-zone">
          <h3>Bot</h3>
          <div id="bot-cards" class="card-row"></div>
        </div>

        <div class="table-center">
          <div class="table-slot">
            <p>Bot jogou</p>
            <div id="table-bot" class="played-card empty">?</div>
          </div>
          <div class="table-slot">
            <p>Você jogou</p>
            <div id="table-human" class="played-card empty">?</div>
          </div>
        </div>

        <div class="player-zone">
          <h3>Sua mão</h3>
          <div id="human-cards" class="card-row interactive"></div>
        </div>
      </section>

      <section class="controls">
        <button id="truco-btn" class="btn accent">Pedir Truco</button>
      </section>

      <section class="status-panel">
        <p id="status-text">Iniciando partida...</p>
        <div id="action-modal" class="modal hidden" role="dialog" aria-modal="true" aria-live="polite">
          <p id="modal-title"></p>
          <div id="modal-actions" class="modal-actions"></div>
        </div>
        <div>
          <h4>Histórico da mão</h4>
          <ul id="history-list"></ul>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
